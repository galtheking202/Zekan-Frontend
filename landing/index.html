<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeKan</title>
  <meta name="description" content="כאן ועכשיו, בלי רעשי רקע." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: linear-gradient(160deg, #68B4F0 0%, #3A8FD6 55%, #2575C4 100%);
    }

    /* ── Wordmark ── */
    .wordmark {
      font-size: clamp(72px, 18vw, 120px);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;
      color: #ffffff;
      margin-bottom: 20px;
      user-select: none;
    }

    .wordmark .k {
      color: rgba(255, 255, 255, 0.45);
    }

    /* ── Tagline ── */
    .tagline {
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.2px;
      margin-bottom: 52px;
      text-align: center;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    .email-input {
      flex: 1;
      height: 124px;
      padding: 18px;
      border: none;
      border-radius: 18px;
      font-size: 20px;
      color: #111;
      background: rgba(255, 255, 255, 0.92);
      outline: none;
      transition: background 0.15s, box-shadow 0.15s;
      direction: ltr;
      text-align: left;
    }

    .email-input::placeholder {
      color: #999;
    }

    .email-input:focus {
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.35);
    }

    .submit-btn {
      height: 52px;
      padding: 0 24px;
      background: #ffffff;
      color: #1A73E8;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }

    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.97); }
    .submit-btn:disabled { opacity: 0.6; cursor: default; }

    /* ── Success ── */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .success-icon {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .success-icon svg {
      width: 24px;
      height: 24px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .success-text {
      font-size: 17px;
      font-weight: 600;
      color: #ffffff;
    }

    .success-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }

    .submit-btn { width: 100%; }

    .form-note {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
      margin-top: 4px;
    }

    .footer {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="page">

    <h1 class="wordmark">Ze<span class="k">K</span>an</h1>

    <p class="tagline">כאן ועכשיו, בלי רעשי רקע.</p>

    <form class="form-row" id="form">
      <input
        class="email-input"
        id="email"
        type="email"
        name="email"
        placeholder="your@email.com"
        autocomplete="email"
        required
      />
      <button class="submit-btn" type="submit">עדכנו אותי!</button>
      <p class="form-note">ללא ספאם. ניצור קשר רק לפני ההשקה.</p>
    </form>

    <div class="success" id="success">
      <div class="success-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
      </div>
      <span class="success-text">נרשמת בהצלחה</span>
      <span class="success-sub">נעדכן אותך כשנהיה מוכנים.</span>
    </div>

  </main>

  <footer class="footer">© 2025 Zekan · כל הזכויות שמורות</footer>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;

      const btn = e.target.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = '...';

      try {
        await fetch('https://server-lowcost.up.railway.app/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        e.target.style.display = 'none';
        document.getElementById('success').style.display = 'flex';
      } catch {
        btn.disabled = false;
        btn.textContent = 'עדכנו אותי!';
      }
    });
  </script>
</body>
</html>
