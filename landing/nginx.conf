server {
    listen       ${PORT};
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                    always;
    add_header X-Frame-Options         "DENY"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'unsafe-inline'; connect-src https://server-lowcost.up.railway.app; img-src 'self' data:; frame-ancestors 'none';" always;

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /privacy {
        try_files /privacy.html =404;
    }

    # Static assets must never fall back to index.html — a missing file
    # served as HTML gets cached by the CDN with the wrong MIME type.
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
